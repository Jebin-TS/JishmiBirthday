<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday Dear Jishmi</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #ffe6f2;
      margin: 0;
      padding: 50px;
    }
    h1 {
      color: #d63384;
    }
    .question {
      margin: 30px 0;
    }
    button {
      margin: 10px;
      padding: 15px 25px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background-color: #ff80bf;
      color: white;
    }
    button:hover {
      background-color: #ff4da6;
    }
    #celebration {
      display: none;
      margin-top: 50px;
    }
    #celebration h2 {
      font-size: 2em;
      color: #d63384;
    }
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    /* Slideshow styling */
    #slideshow {
  margin-top: 30px;
  position: relative;
  width: 80%;          /* make it responsive */
  max-width: 600px;    /* limit maximum size */
  height: auto;        /* let height adjust */
  margin-left: auto;
  margin-right: auto;
  overflow: hidden;
  border-radius: 12px;
  box-shadow: 0 0 15px rgba(0,0,0,0.3);
}
#slideshow img {
  position: absolute;
  width: 100%;
  height: auto;             /* keep natural aspect ratio */
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%); /* center the image */
  object-fit: contain;
  background: #000;
  opacity: 0;
  transition: opacity 1s;
}
    #slideshow img.active {
      opacity: 1;
    }
    audio {
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>Jishmi's Birthday Quiz 🎂</h1>

  <div id="quiz">
    <div class="question" id="q1">
      <h2>What is Jishmi birth year?</h2>
      <button onclick="nextQuestion(1, false)">2001</button>
      <button onclick="nextQuestion(1, true)">2002</button>
      <button onclick="nextQuestion(1, false)">2003</button>
    </div>

    <div class="question" id="q2" style="display:none;">
      <h2>What is Jishmi’s birth month?</h2>
      <button onclick="nextQuestion(2, false)">February</button>
      <button onclick="nextQuestion(2, true)">March</button>
      <button onclick="nextQuestion(2, false)">April</button>
    </div>

    <div class="question" id="q3" style="display:none;">
      <h2>What is Jishmi's birth date?</h2>
      <button onclick="nextQuestion(3, false)">26</button>
      <button onclick="nextQuestion(3, false)">28</button>
      <button onclick="nextQuestion(3, true)">29</button>
    </div>
  </div>

  <div id="celebration">
    <h2>🎉 It’s your birthday My Dear, Jishmi! 🎂</h2>
    <p>Wishing you love, joy, and endless happiness!</p>

    <!-- Slideshow -->
    <div id="slideshow">
      <img src="Ring.JPG" class="active" alt="Memory 1">
      <img src="Sipup.jpg" alt="Memory 2">
      <img src="birthday.jpg" alt="Memory 3">
      <img src="Laugh.JPG" alt="Memory 4">
      <img src="photo200.jpg" alt="Memory 5">
    </div>

    <!-- Music Player -->
    <audio controls autoplay>
      <source src="videoplayback.weba" type="audio/webm">
      Your browser does not support the audio element.
    </audio>
  </div>

  <canvas id="confetti"></canvas>

  <script>
    function nextQuestion(q, correct) {
      if (!correct) {
        alert("Oops, try again!");
        return;
      }
      document.getElementById("q" + q).style.display = "none";
      if (q < 3) {
        document.getElementById("q" + (q + 1)).style.display = "block";
      } else {
        document.getElementById("celebration").style.display = "block";
        startConfetti();
        startSlideshow();
      }
    }

    // Confetti effect
    const canvas = document.getElementById("confetti");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    let confettiPieces = [];

    function startConfetti() {
      confettiPieces = [];
      for (let i = 0; i < 200; i++) {
        confettiPieces.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height - canvas.height,
          r: Math.random() * 6 + 2,
          d: Math.random() * 10 + 5,
          color: "hsl(" + Math.random() * 360 + ",100%,50%)",
        });
      }
      requestAnimationFrame(drawConfetti);
    }

    function drawConfetti() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      confettiPieces.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2, false);
        ctx.fillStyle = p.color;
        ctx.fill();
        p.y += p.d;
        if (p.y > canvas.height) {
          p.y = -10;
          p.x = Math.random() * canvas.width;
        }
      });
      requestAnimationFrame(drawConfetti);
    }

    // Slideshow logic
    function startSlideshow() {
      const slides = document.querySelectorAll("#slideshow img");
      let index = 0;
      setInterval(() => {
        slides[index].classList.remove("active");
        index = (index + 1) % slides.length;
        slides[index].classList.add("active");
      }, 3000); // change every 3 seconds
    }
  </script>

</body>
</html>
