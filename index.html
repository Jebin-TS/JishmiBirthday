<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday Dear Jishmi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- mobile scaling -->
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #ffe6f2;
      margin: 0;
      padding: 30px;
    }
    h1 {
      color: #d63384;
    }
    .question {
      margin: 30px 0;
    }
    button {
      margin: 10px;
      padding: 15px 25px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background-color: #ff80bf;
      color: white;
    }
    button:hover {
      background-color: #ff4da6;
    }
    #celebration {
      display: none;
      margin-top: 40px;
    }
    #celebration h2 {
      font-size: 1.8em;
      color: #d63384;
    }
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* Horizontal scrolling gallery */
  #gallery-wrapper {
  overflow-x: auto;       /* allow horizontal scroll */
  -webkit-overflow-scrolling: touch; /* smooth scroll on iOS */
  white-space: nowrap;    /* keep images in one line */
  width: 100%;
  max-width: 95%;
  margin: 20px auto;
}

#gallery img {
  display: inline-block;
  width: 250px;
  height: auto;
  margin: 0 10px;
  border-radius: 8px;
  object-fit: cover;
}

    @keyframes scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    audio {
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>Jishmi's Birthday Quiz 🎂</h1>

  <div id="quiz">
    <div class="question" id="q1">
      <h2>What is Jishmi birth year?</h2>
      <button onclick="nextQuestion(1, false)">2001</button>
      <button onclick="nextQuestion(1, true)">2002</button>
      <button onclick="nextQuestion(1, false)">2003</button>
    </div>

    <div class="question" id="q2" style="display:none;">
      <h2>What is Jishmi’s birth month?</h2>
      <button onclick="nextQuestion(2, false)">February</button>
      <button onclick="nextQuestion(2, true)">March</button>
      <button onclick="nextQuestion(2, false)">April</button>
    </div>

    <div class="question" id="q3" style="display:none;">
      <h2>What is Jishmi's birth date?</h2>
      <button onclick="nextQuestion(3, false)">26</button>
      <button onclick="nextQuestion(3, false)">28</button>
      <button onclick="nextQuestion(3, true)">29</button>
    </div>
  </div>

  <div id="celebration">
    <h2>🎉 It’s your birthday Dear, Jishmi! 🎂</h2>
    <p>Wishing you love, joy, and endless happiness!</p>

    <!-- Horizontal gallery -->
  <div id="gallery-wrapper">
  <div id="gallery">
    <img src="Sipup.jpg" alt="Memory 1">
    <img src="birthday.jpg" alt="Memory 2">
    <img src="laugh.JPG" alt="Memory 3">
    <img src="photo200.jpg" alt="Memory 4">
  </div>
</div>


    <!-- Music Player -->
    <audio controls autoplay>
      <source src="videoplayback.weba" type="audio/webm">
      Your browser does not support the audio element.
    </audio>
  </div>

  <canvas id="confetti"></canvas>

  <script>
    function nextQuestion(q, correct) {
      if (!correct) {
        alert("Oops, try again!");
        return;
      }
      document.getElementById("q" + q).style.display = "none";
      if (q < 3) {
        document.getElementById("q" + (q + 1)).style.display = "block";
      } else {
        document.getElementById("celebration").style.display = "block";
        startConfetti();
      }
    }

    // Confetti effect
    const canvas = document.getElementById("confetti");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    let confettiPieces = [];

    function startConfetti() {
      confettiPieces = [];
      for (let i = 0; i < 200; i++) {
        confettiPieces.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height - canvas.height,
          r: Math.random() * 6 + 2,
          d: Math.random() * 10 + 5,
          color: "hsl(" + Math.random() * 360 + ",100%,50%)",
        });
      }
      requestAnimationFrame(drawConfetti);
    }

    function drawConfetti() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      confettiPieces.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2, false);
        ctx.fillStyle = p.color;
        ctx.fill();
        p.y += p.d;
        if (p.y > canvas.height) {
          p.y = -10;
          p.x = Math.random() * canvas.width;
        }
      });
      requestAnimationFrame(drawConfetti);
    }
  </script>

</body>
</html>
